name: RPST - Deploy Base Structure with GitHub OIDC to OCI

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-rpst-base:
    runs-on: ubuntu-latest

    env:
      CLIENT_ID: "b3edbc93d0d54c6e85c2c6648ec12c80"
      CLIENT_SECRET: "idcscs-836c279c-2126-4a6b-b6dd-d506d5871747"
      DOMAIN_BASE_URL: "https://idcs-2e5549d1bc154fef937243cd31fcf1af.identity.oraclecloud.com:443"

      OCI_TENANCY: ${{ vars.OCI_TENANCY }}
      OCI_REGION: "ca-toronto-1"

      BASE_TERRAFORM_DIR: "terraform/base-structure"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate RSA Key Pair
        run: |
          mkdir -p .oci
          openssl genrsa -out .oci/temp_private.pem 2048
          openssl rsa -in .oci/temp_private.pem -pubout -out .oci/temp_public.pem
          chmod 600 .oci/temp_private.pem .oci/temp_public.pem

      - name: Convert Public Key to Single Line
        run: |
          awk '
            /BEGIN PUBLIC KEY/ {skip=1; next}
            /END PUBLIC KEY/   {skip=0; next}
            skip {gsub(/\r/, ""); printf "%s", $0;}
          ' .oci/temp_public.pem > .oci/public_key.one_line.pem

      - name: Fetch GitHub OIDC Token
        run: |
          curl -sSL \
            -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${CLIENT_ID}" > id-token.json

          JWT=$(jq -r '.value' id-token.json)

          if [ -z "$JWT" ] || [ "$JWT" = "null" ]; then
            echo "Failed to fetch GitHub OIDC token"
            cat id-token.json
            exit 1
          fi

          echo "$JWT" > .oci/id-token.jwt

      - name: Exchange JWT for OCI RPST
        run: |
          AUTH_HEADER=$(printf "%s" "${CLIENT_ID}:${CLIENT_SECRET}" | base64 | tr -d '\n')
          SUBJECT_TOKEN=$(tr -d '\n' < .oci/id-token.jwt)
          PUBKEY=$(tr -d '\n' < .oci/public_key.one_line.pem)

          RESPONSE=$(curl -sSL \
            --header "Content-Type: application/x-www-form-urlencoded" \
            --header "Authorization: Basic $AUTH_HEADER" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            --data-urlencode "requested_token_type=urn:oci:token-type:oci-rpst" \
            --data-urlencode "subject_token=$SUBJECT_TOKEN" \
            --data-urlencode "subject_token_type=jwt" \
            --data-urlencode "public_key=$PUBKEY" \
            --data-urlencode "res_type=ref_github" \
            "${DOMAIN_BASE_URL}/oauth2/v1/token")

          echo "$RESPONSE" > .oci/RPST-response.json
          jq -r '.token' .oci/RPST-response.json | tr -d '\n' > .oci/RPST.token

          if [ ! -s .oci/RPST.token ]; then
            echo "Failed to extract RPST token"
            cat .oci/RPST-response.json
            exit 1
          fi

          echo "RPST token was successfully extracted"

      - name: Create OCI config for Terraform
        run: |
          chmod 600 .oci/temp_private.pem .oci/RPST.token

          FINGERPRINT=$(openssl rsa -pubout -outform DER -in .oci/temp_private.pem 2>/dev/null | openssl md5 -c | awk '{print $2}')
          WORK_DIR=$(pwd)
          CONFIG_PATH="${WORK_DIR}/.oci/RPST_config"

          {
            echo "[DEFAULT]"
            echo "region=${OCI_REGION}"
            echo "tenancy=${OCI_TENANCY}"
            echo "fingerprint=${FINGERPRINT}"
            echo "key_file=${WORK_DIR}/.oci/temp_private.pem"
            echo "security_token_file=${WORK_DIR}/.oci/RPST.token"
          } > "$CONFIG_PATH"

          echo "OCI_CONFIG_FILE=${CONFIG_PATH}" >> "$GITHUB_ENV"

          mkdir -p /home/runner/.oci
          cp "$CONFIG_PATH" /home/runner/.oci/config

          echo "Created OCI config:"
          cat "$CONFIG_PATH"

      - name: Upload Debug Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oci-rpst-base-debug
          path: |
            .oci/RPST-response.json
            .oci/RPST.token
            .oci/RPST_config
            .oci/id-token.jwt
            .oci/public_key.one_line.pem
            .oci/temp_private.pem

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init - Base Structure
        run: terraform init
        working-directory: ${{ env.BASE_TERRAFORM_DIR }}
        env:
          OCI_CONFIG_FILE: ${{ env.OCI_CONFIG_FILE }}
          TF_VAR_region: ${{ env.OCI_REGION }}
          TF_VAR_tenancy_ocid: ${{ env.OCI_TENANCY }}

      - name: Terraform Plan - Base Structure
        run: terraform plan -out=tfplan
        working-directory: ${{ env.BASE_TERRAFORM_DIR }}
        env:
          OCI_CONFIG_FILE: ${{ env.OCI_CONFIG_FILE }}
          TF_VAR_region: ${{ env.OCI_REGION }}
          TF_VAR_tenancy_ocid: ${{ env.OCI_TENANCY }}

      - name: Terraform Apply - Base Structure
        run: terraform apply -auto-approve tfplan
        working-directory: ${{ env.BASE_TERRAFORM_DIR }}
        env:
          OCI_CONFIG_FILE: ${{ env.OCI_CONFIG_FILE }}
          TF_VAR_region: ${{ env.OCI_REGION }}
          TF_VAR_tenancy_ocid: ${{ env.OCI_TENANCY }}

      - name: Capture Terraform Outputs
        run: terraform output -json > terraform_outputs.json
        working-directory: ${{ env.BASE_TERRAFORM_DIR }}
        env:
          OCI_CONFIG_FILE: ${{ env.OCI_CONFIG_FILE }}
          TF_VAR_region: ${{ env.OCI_REGION }}
          TF_VAR_tenancy_ocid: ${{ env.OCI_TENANCY }}

      - name: Show Terraform Outputs
        run: cat terraform_outputs.json
        working-directory: ${{ env.BASE_TERRAFORM_DIR }}

      - name: Upload Base Outputs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: base-terraform-outputs
          path: ${{ env.BASE_TERRAFORM_DIR }}/terraform_outputs.json
